# Pexels 画廊 — Cloudflare Worker 配置
# 使用 README 中的一键部署按钮，或手动通过 Cloudflare Dashboard 部署
# 部署后在 Settings → Variables and Secrets 中添加 Secret：PEXELS_API_KEY

name = "pexels-gallery"
main = "worker.js"
compatibility_date = "2025-07-03"

# 启用自动创建 workers.dev 子域名
workers_dev = true

# 自定义域名路由配置（取消注释并替换为你的域名）
# 部署前需确保域名已添加到 Cloudflare 账户并完成 DNS 配置
# [[routes]]
# pattern = "your-domain.com/*"
# zone_name = "your-domain.com"
